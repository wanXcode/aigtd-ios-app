name: AIGTDReminders
options:
  bundleIdPrefix: com.wan.todo
  developmentLanguage: en
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: AIGTD Reminders
    MARKETING_VERSION: 0.2.0
    CURRENT_PROJECT_VERSION: 2
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  AIGTDReminders:
    type: application
    platform: iOS
    configFiles:
      Debug: Pods/Target Support Files/Pods-AIGTDReminders/Pods-AIGTDReminders.debug.xcconfig
      Release: Pods/Target Support Files/Pods-AIGTDReminders/Pods-AIGTDReminders.release.xcconfig
    sources:
      - path: Sources
        includes:
          - "**/*.swift"
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wan.todo.aigtdreminders
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Support/AIGTDReminders-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Pods/SpeechEngineAsrToB/pod/classes/SpeechEngine
          - $(SRCROOT)/Pods/SpeechEngineAsrToB/pod/classes/ResourceManager
        INFOPLIST_KEY_CFBundleDevelopmentRegion: en
        INFOPLIST_KEY_CFBundleAllowMixedLocalizations: YES
        INFOPLIST_KEY_CFBundleDisplayName: AIGTD
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: AIGTD needs microphone access so it can record your voice and transcribe it into tasks.
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: AIGTD needs access to your reminders so it can read, create, and update tasks for you.
        INFOPLIST_KEY_NSRemindersUsageDescription: AIGTD needs access to your reminders so it can read, create, and update tasks for you.
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      gatherCoverageData: false
      testTargets: []
